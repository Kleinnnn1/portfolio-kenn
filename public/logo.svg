<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Main gradient matching pixel grid palette -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7a5ae0"/>
      <stop offset="50%"  stop-color="#5a7ae0"/>
      <stop offset="100%" stop-color="#5ae0d4"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner grid clip -->
    <clipPath id="hexClip">
      <rect x="10" y="10" width="100" height="100" rx="16"/>
    </clipPath>
  </defs>

  <!-- Outer border square with rounded corners -->
  <rect x="10" y="10" width="100" height="100" rx="16"
    fill="rgba(10,10,10,0.0)"
    stroke="url(#logoGrad)"
    stroke-width="1.5"
    opacity="0.7"
  />

  <!-- Subtle pixel grid pattern inside -->
  <g clip-path="url(#hexClip)" opacity="0.12">
    <!-- Horizontal grid lines -->
    <line x1="10" y1="35"  x2="110" y2="35"  stroke="#5a7ae0" stroke-width="0.5"/>
    <line x1="10" y1="60"  x2="110" y2="60"  stroke="#5a7ae0" stroke-width="0.5"/>
    <line x1="10" y1="85"  x2="110" y2="85"  stroke="#5a7ae0" stroke-width="0.5"/>
    <!-- Vertical grid lines -->
    <line x1="35"  y1="10" x2="35"  y2="110" stroke="#5a7ae0" stroke-width="0.5"/>
    <line x1="60"  y1="10" x2="60"  y2="110" stroke="#5a7ae0" stroke-width="0.5"/>
    <line x1="85"  y1="10" x2="85"  y2="110" stroke="#5a7ae0" stroke-width="0.5"/>
  </g>

  <!-- Corner accent dots (matching timeline dots) -->
  <circle cx="10" cy="10" r="2.5" fill="#7a5ae0" opacity="0.6"/>
  <circle cx="110" cy="10" r="2.5" fill="#5ae0d4" opacity="0.6"/>
  <circle cx="10" cy="110" r="2.5" fill="#5ae0d4" opacity="0.6"/>
  <circle cx="110" cy="110" r="2.5" fill="#7a5ae0" opacity="0.6"/>

  <!-- K letter -->
  <g filter="url(#glow)" fill="url(#logoGrad)">
    <!-- K vertical bar -->
    <rect x="30" y="32" width="7" height="56" rx="2"/>
    <!-- K upper diagonal -->
    <polygon points="37,60 66,32 75,32 46,60"/>
    <!-- K lower diagonal -->
    <polygon points="37,60 75,88 66,88 37,62"/>
  </g>

  <!-- Small "B" initial — subtle, bottom right -->
  <text
    x="90"
    y="92"
    font-family="monospace"
    font-size="13"
    font-weight="700"
    fill="url(#logoGrad)"
    opacity="0.55"
    text-anchor="middle"
  >B</text>

  <!-- Thin accent line under K -->
  <line x1="30" y1="93" x2="72" y2="93" stroke="url(#logoGrad)" stroke-width="1" opacity="0.4"/>
</svg>
